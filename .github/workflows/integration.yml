name: Integration Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
      DATABASE_SSL_REJECT_UNAUTHORIZED: "false"
      JWT_SECRET: test_jwt_secret_16_chars
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_16_chars
      TRUST_PROXY: "false"
      CORS_ORIGIN: http://localhost:5173
      API_PUBLIC_URL: http://localhost:4100
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
      INTEGRATION_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run test:integration
